version: '3.8'

services:
  jsonrec-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jsonrec-backend
    ports:
      - "4005:3000"
    volumes:
      - sqlite_data:/usr/src/app/data
    restart: unless-stopped
    environment:
      - PORT=3000

  jsonrec-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jsonrec-frontend
    ports:
      - "6005:80"
    depends_on:
      - jsonrec-backend
    restart: unless-stopped

volumes:
  sqlite_data:
